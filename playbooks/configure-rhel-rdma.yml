---
# Configure RHEL and RDMA on head node and BM nodes.
# Run after Terraform apply. Use inventory built from stack outputs.
#
# Ansible from head (cloud-init): only runs when Terraform run_ansible_from_head=true.
# With run_ansible_from_head=false, nothing runs automatically — run this playbook yourself.
# On the head, if you ever used bootstrap: tail -200 /var/log/oci-hpc-ansible-bootstrap.log
#
# Example:
#   ansible-playbook -i inventory/hosts.yml configure-rhel-rdma.yml \
#     -e "rhsm_username=your_rhsm_user" -e "rhsm_password=your_rhsm_pass" \
#     --ask-become-pass
#
# Or use a vault for secrets:
#   ansible-playbook -i inventory/hosts.yml configure-rhel-rdma.yml --ask-vault-pass

# If you run Ansible from the head with hostname-only inventory, populate /etc/hosts first.
- name: Populate /etc/hosts on head from inventory
  hosts: head
  gather_facts: false
  become: true
  tasks:
    - name: Add cluster lines to /etc/hosts (same as cluster_setup role)
      ansible.builtin.import_role:
        name: cluster_setup
        tasks_from: etc_hosts.yml

- name: Cluster setup (hosts file + passwordless SSH)
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Configure /etc/hosts and passwordless SSH
      include_role:
        name: cluster_setup

- name: RHEL and RDMA configuration
  hosts: all
  become: true
  gather_facts: true
  vars:
    bm_prefix: "bm-node-"
  tasks:
    - name: Ensure RHEL nodes are registered and prepared (BM nodes; skip Oracle Linux head)
      include_role:
        name: rhel_prep
      when: ansible_distribution == "RedHat"

- name: RDMA authentication and re-auth timer (BM cluster network only)
  hosts: bm
  become: true
  vars:
    # RDMA interface on BM.Optimized3.36 in cluster network is typically eth2 (secondary VNIC)
    rdma_interface: "{{ rdma_interface | default('eth2') }}"
    # Set to another BM node's RDMA (secondary VNIC) IP for ping test
    rdma_ping_target: "{{ rdma_ping_target | default('') }}"
    # oci-cn-auth URLs: defaults in roles/rdma_auth/defaults/main.yml (PHX → IAD → SJC). Override oci_cn_auth_rpm_urls if needed.
  tasks:
    - name: Configure RDMA auth and nm-cloud-setup
      include_role:
        name: rdma_auth
      when: ansible_os_family == "RedHat"
