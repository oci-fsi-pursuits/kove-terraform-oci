---
# Cluster-wide: /etc/hosts and passwordless SSH for all nodes.
# Use each host's SSH user (ansible_user from inventory) so head=opc and BM=cloud-user both work.
# Preserves login keys from Terraform (stack_ssh_authorized_keys_lines in extra_vars) and any existing
# authorized_keys lines, then appends each host's generated id_rsa.pub (oci-hpc-style cluster keys).
# Without the stack_* list, a failed/empty slurp could rewrite authorized_keys and lock you out after Ansible runs.

- name: Set cluster SSH user fact (per-host; prefer inventory ansible_user over global cluster_ssh_user)
  ansible.builtin.set_fact:
    _cluster_user: "{{ ansible_user | default(cluster_ssh_user_override | default(cluster_ssh_user | default('cloud-user'))) }}"

- name: Ensure .ssh directory exists for cluster user
  ansible.builtin.file:
    path: "/home/{{ _cluster_user }}/.ssh"
    state: directory
    owner: "{{ _cluster_user }}"
    group: "{{ _cluster_user }}"
    mode: "0700"

- name: Generate SSH key for cluster user if not present
  ansible.builtin.command:
    cmd: ssh-keygen -t rsa -N "" -f /home/{{ _cluster_user }}/.ssh/id_rsa
    creates: "/home/{{ _cluster_user }}/.ssh/id_rsa"
  become_user: "{{ _cluster_user }}"
  changed_when: true

- name: Read SSH public key into fact
  ansible.builtin.slurp:
    src: "/home/{{ _cluster_user }}/.ssh/id_rsa.pub"
  register: _ssh_pubkey_slurp
  become_user: "{{ _cluster_user }}"
  delegate_to: "{{ inventory_hostname }}"
  run_once: false

- name: Set cluster SSH public key fact
  ansible.builtin.set_fact:
    cluster_ssh_pubkey: "{{ _ssh_pubkey_slurp.content | b64decode | trim }}"

- name: Stat existing authorized_keys (Terraform / cloud-init keys)
  ansible.builtin.stat:
    path: "/home/{{ _cluster_user }}/.ssh/authorized_keys"
  register: _auth_stat

- name: Slurp existing authorized_keys
  ansible.builtin.slurp:
    src: "/home/{{ _cluster_user }}/.ssh/authorized_keys"
  register: _existing_auth_slurp
  when: _auth_stat.stat.exists

- name: Parse existing authorized key lines
  ansible.builtin.set_fact:
    _existing_key_lines: "{{ ((_existing_auth_slurp.content | b64decode).splitlines() | map('trim') | reject('equalto', '') | reject('match', '^#') | list) }}"
  when: _auth_stat.stat.exists

- name: No pre-existing authorized_keys lines
  ansible.builtin.set_fact:
    _existing_key_lines: []
  when: not _auth_stat.stat.exists

- name: Terraform login key lines from extra_vars (always merge; see main.tf extra_vars_yaml)
  ansible.builtin.set_fact:
    _stack_login_lines: "{{ stack_ssh_authorized_keys_lines | default([]) | map('trim') | reject('equalto', '') | list }}"

- name: Build authorized_keys (stack login + existing file + every host's cluster RSA pubkey, deduped)
  ansible.builtin.set_fact:
    _authorized_keys_content: >-
      {{
        (
          (_stack_login_lines | default([]))
          + (_existing_key_lines | default([]))
          + (groups['all'] | map('extract', hostvars) | selectattr('cluster_ssh_pubkey', 'defined') | map(attribute='cluster_ssh_pubkey') | list)
        ) | map('trim') | reject('equalto', '') | unique | join('\n')
      }}

- name: Deploy authorized_keys for passwordless SSH (keeps login keys)
  ansible.builtin.copy:
    dest: "/home/{{ _cluster_user }}/.ssh/authorized_keys"
    content: "{{ _authorized_keys_content }}\n"
    owner: "{{ _cluster_user }}"
    group: "{{ _cluster_user }}"
    mode: "0600"

- name: Add cluster lines to /etc/hosts
  ansible.builtin.import_tasks: etc_hosts.yml
