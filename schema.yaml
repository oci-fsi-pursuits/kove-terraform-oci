title: "Kove Infra Build on OCI"
description: "Kove infra: head node plus bare metal RHEL 8.8 workers (BM.Optimized3.36 by default) on OCI."
informationalText: "Provide one RHEL 8.8 image OCID for BM nodes. Use Oracle Linux for the head when head image is left empty. **Run Ansible from head** defaults to **Yes**: cloud-init installs playbooks under /opt/oci-hpc-ansible on first boot (set No only if you will run Ansible manually). You still need dynamic-group instance-principal policies and RHSM for RHEL BMs. If that folder is missing, the head was created with Ansible off—turn it on and replace the head instance, then Apply again. Tenancy/region are pre-filled. Zip source: Git tag Kove-RHEL88-OCI."
schemaVersion: 1.1.0
version: "20190304"
locale: "en"

variableGroups:
  - title: "Target Configuration"
    variables:
      - compartment_ocid
      - ssh_public_key
      - bm_node_image_ocid
      - head_node_image_ocid

  - title: "Ansible from head (recommended)"
    variables:
      - run_ansible_from_head
      - bm_pool_ready_wait
      - instance_ssh_user
      - rhsm_username
      - rhsm_password

  - title: "Networking"
    variables:
      - use_existing_vcn
      - existing_vcn_id
      - existing_public_subnet_id
      - existing_private_subnet_id
      - availability_domain
      - cluster_network_availability_domain
      - use_compute_agent
      - bm_imds_ssh_key_bootstrap
      - create_vnc
      - bm_capacity_reservation_id
      - bm_generic_platform_config
      - bm_boot_volume_size_gbs
      - cluster_network_create_timeout

  - title: "Optional Naming"
    variables:
      - enable_custom_names
      - custom_name_prefix

variables:
  tenancy_ocid:
    type: string
    title: "Tenancy OCID"
    description: "Pre-filled from your session. Change only if deploying to a different tenancy."
    required: true
    visible: false

  region:
    type: oci:identity:region:name
    title: "Region"
    description: "Pre-filled from your session. Change only if deploying to a different region."
    required: true
    visible: false

  enable_custom_names:
    type: boolean
    title: "Enable custom names"
    description: "Off by default. When true, custom prefix is used for VCN/subnet/network display names and instance/cluster display names."
    default: false
    required: false

  custom_name_prefix:
    type: string
    title: "Custom name prefix"
    description: "Used only when Enable custom names is true. Example: kove-phx."
    default: ""
    required: false

  compartment_ocid:
    type: oci:identity:compartment:id
    title: "Compartment"
    description: "Compartment where resources are created."
    required: true
    dependsOn:
      compartmentId: ${tenancy_ocid}

  ssh_public_key:
    type: oci:core:ssh:publickey
    title: "SSH Public Key"
    description: "Public key injected into all instances (head and BM nodes). Use the same key you use to SSH to the head."
    required: true

  bm_node_image_ocid:
    type: oci:core:image:id
    title: "RHEL 8.8 Image (BM nodes)"
    description: "RHEL 8.8 image for BM cluster network nodes."
    required: true
    dependsOn:
      compartmentId: ${compartment_ocid}

  head_node_image_ocid:
    type: oci:core:image:id
    title: "Head node image (optional)"
    description: "Image for the head node. If empty, uses latest Oracle Linux 8 (recommended; no RHSM on head). Ansible registers RHEL on BM nodes only."
    required: false
    dependsOn:
      compartmentId: ${compartment_ocid}

  use_existing_vcn:
    type: boolean
    title: "Use Existing VCN"
    description: "If true, provide existing VCN and subnet OCIDs below."
    default: false
    required: true

  existing_vcn_id:
    type: oci:core:vcn:id
    title: "Existing VCN"
    description: "Required when Use Existing VCN is true."
    required: false
    dependsOn:
      compartmentId: ${compartment_ocid}

  existing_public_subnet_id:
    type: oci:core:subnet:id
    title: "Existing Public Subnet"
    description: "Public subnet for the head node when using existing VCN."
    required: false
    dependsOn:
      compartmentId: ${compartment_ocid}
      vcnId: ${existing_vcn_id}

  existing_private_subnet_id:
    type: oci:core:subnet:id
    title: "Existing Private Subnet"
    description: "Private subnet for BM nodes when using existing VCN."
    required: false
    dependsOn:
      compartmentId: ${compartment_ocid}
      vcnId: ${existing_vcn_id}

  availability_domain:
    type: string
    title: "Stack availability domain (recommended)"
    description: "Single AD for head VM and BM compute cluster (e.g. pILZ:PHX-AD-2). When set, overrides subnet-derived placement and BM-only cluster_network_availability_domain. Leave empty to derive from subnets."
    required: false

  cluster_network_availability_domain:
    type: string
    title: "BM availability domain (optional fallback)"
    description: "Used only when Stack availability domain is empty. Placement AD for compute cluster and BM instances; else private subnet AD or first tenancy AD."
    required: false

  use_compute_agent:
    type: boolean
    title: "Oracle HPC compute agent (RDMA plugins)"
    description: "Matches oci-hpc use_compute_agent. Disable for custom RHEL if BM launch fails; use Ansible for RDMA when false."
    default: true
    required: true

  bm_imds_ssh_key_bootstrap:
    type: boolean
    title: "BM: install SSH keys from metadata (custom RHEL)"
    description: "First-boot script copies instance ssh_authorized_keys from OCI IMDS into opc, cloud-user, and ec2-user if those accounts exist. Enable for Image Builder RHEL images that skip default key injection. Replace BM instances after changing this; user_data runs only at first boot."
    default: true
    required: false

  create_vnc:
    type: boolean
    title: "BM: create instance console connections (VNC)"
    description: "If true, creates an OCI instance console connection per BM node for serial console access via SSH tunnel (uses the stack SSH public key)."
    default: false
    required: false

  cluster_display_name_prefix:
    type: string
    title: "Cluster name prefix"
    description: "Prefix for compute cluster, BM instances, and head display names (e.g. kove, bm2)."
    default: "bm"
    required: false
    visible: false

  bm_capacity_reservation_id:
    type: string
    title: "BM capacity reservation OCID (optional)"
    description: "Leave empty unless your tenancy requires a capacity reservation for bare metal; required for some BM.Optimized3 launches."
    required: false

  bm_generic_platform_config:
    type: boolean
    title: "GENERIC_BM platform config"
    description: "Adds oci-hpc-style GENERIC_BM platform_config. BM.Optimized3 compute-cluster launches often require false (400 unsupported platform configuration)."
    default: false
    required: true

  bm_boot_volume_size_gbs:
    type: number
    title: "BM boot volume size (GB)"
    description: "Boot volume size for BM instances. Default 120; increase if image requires more space."
    default: 120
    required: false

  cluster_network_create_timeout:
    type: string
    title: "BM instance create timeout"
    description: "Max wait per BM instance create. Empty defaults to 2h. (Kept variable name for existing stacks.)"
    default: ""
    required: false

  run_ansible_from_head:
    type: boolean
    title: "Run Ansible from head at first boot"
    description: "Yes = embed playbooks in head user_data; cloud-init creates /opt/oci-hpc-ansible and runs the playbook after boot (Resource Manager automates this in one Apply). Requires dynamic group + instance principal policies, and RHSM credentials for RHEL BMs. No = no user_data; paths and log will not exist until you enable this and replace the head instance."
    default: true
    required: true

  bm_pool_ready_wait:
    type: string
    title: "Wait after BM instances (Ansible)"
    description: "Delay after BM instances exist before creating the head node (e.g. 10m). Increase if bootstrap user_data lacks private IPs or inventory [bm] is empty."
    default: "10m"
    required: false

  instance_ssh_user:
    type: string
    title: "SSH user for BM nodes"
    description: "Ansible SSH user for bare metal nodes. Default cloud-user for this RHEL image flow."
    default: "cloud-user"
    required: false

  head_node_ssh_user:
    type: string
    title: "SSH user for head node"
    description: "User on head node (opc for Oracle Linux, cloud-user for RHEL). Default opc matches the default Oracle Linux head image."
    default: "opc"
    required: false
    visible: false

  rhsm_username:
    type: string
    title: "RHSM username"
    description: "Red Hat Subscription Manager username (when Run Ansible from head is true)."
    required: false

  rhsm_password:
    type: string
    title: "RHSM password"
    description: "Red Hat Subscription Manager password (when Run Ansible from head is true)."
    required: false

  rdma_ping_target:
    type: string
    title: "RDMA ping target IP"
    description: "Optional IP for RDMA ping check (e.g. another BM node's RDMA interface)."
    required: false
    visible: false

outputs:
  created_vcn_id:
    title: "Created/Selected VCN OCID"
    visible: true
  head_node_public_ip:
    title: "Head Node Public IP"
    visible: true
  bm_node_private_ips:
    title: "BM Node Private IPs"
    visible: true
  bm_instance_ids:
    title: "BM Instance OCIDs"
    visible: true
  compute_cluster_id:
    title: "Compute Cluster OCID"
    visible: true
  cluster_ssh_private_key_openssh:
    title: "Emergency SSH key for opc (ED25519, sensitive)"
    visible: true
  cluster_ssh_public_key_openssh:
    title: "Cluster SSH public key (verify BM authorized_keys)"
    visible: true
